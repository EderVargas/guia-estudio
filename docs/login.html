<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - Guia de Estudio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #999;
            font-size: 0.95em;
            margin-bottom: 35px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            transition: border-color 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-msg {
            background: #ffe8e8;
            color: #c0392b;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.9em;
            margin-top: 16px;
            display: none;
        }

        .loading-msg {
            color: #999;
            font-size: 0.9em;
            margin-top: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Guia de Estudio</h1>
        <p class="subtitle">Ingresa tus datos para continuar</p>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" autocomplete="username" autocapitalize="none" required />
            </div>
            <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" id="password" autocomplete="current-password" required />
            </div>
            <button type="submit" class="btn" id="submit-btn">Entrar</button>
        </form>

        <p class="error-msg" id="error-msg">Usuario o contrasena incorrectos.</p>
        <p class="loading-msg" id="loading-msg">Verificando...</p>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (isAuthenticated()) {
            window.location.replace('index.html');
        }

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var btn = document.getElementById('submit-btn');
            var errorMsg = document.getElementById('error-msg');
            var loadingMsg = document.getElementById('loading-msg');

            btn.disabled = true;
            errorMsg.style.display = 'none';
            loadingMsg.style.display = 'block';

            try {
                var res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                if (res.ok) {
                    var data = await res.json();
                    setToken(data.access_token);
                    window.location.replace('index.html');
                } else {
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.textContent = 'Error de conexion. Intenta de nuevo.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
            } finally {
                loadingMsg.style.display = 'none';
            }
        });
    </script>
</body>
</html>
